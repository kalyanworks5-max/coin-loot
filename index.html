<!DOCTYPE html>
<html>
<head>
<title>Coin Loot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===============================
🎨 PAGE DESIGN
================================ */
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

/* ===============================
🔘 BUTTON STYLE
================================ */
button{
background:#ff9800;
border:none;
padding:15px;
font-size:18px;
border-radius:8px;
color:white;
cursor:pointer;
margin:10px;
}

/* ===============================
🪙 COINS BOX
================================ */
#coinsBox{
font-size:25px;
margin-top:20px;
background:#222;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- ===============================
🪙 WEBSITE TITLE
================================ -->
<h1>Coin Loot</h1>

<!-- ===============================
🔐 GOOGLE LOGIN BUTTON
================================ -->
<button onclick="googleLogin()">Login With Google</button>

<!-- ===============================
👤 USER NAME SHOW
================================ -->
<h3 id="username"></h3>

<!-- ===============================
🪙 COINS DISPLAY
================================ -->
<div id="coinsBox">
Coins: <span id="coins">0</span>
</div>

<!-- ===============================
📺 WATCH AD BUTTON
================================ -->
<button onclick="watchAd()">Watch Ad +100 Coins</button>

<!-- ===============================
🎁 DAILY REWARD BUTTON
================================ -->
<button onclick="dailyReward()">Daily Reward +500</button>


<script type="module">

/* ===============================
🔥 FIREBASE IMPORT
================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
getDatabase,
ref,
set,
get,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* ===============================
⚙️ FIREBASE CONFIG
================================ */

const firebaseConfig = {

apiKey: "AIzaSyBhMUIld4qnt42X0BWF_kYZr2R2olDghts",
authDomain: "coinloot-f15f3.firebaseapp.com",
databaseURL: "https://coinloot-f15f3-default-rtdb.firebaseio.com",
projectId: "coinloot-f15f3",
storageBucket: "coinloot-f15f3.firebasestorage.app",
messagingSenderId: "939943880173",
appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4"

};


/* ===============================
🚀 FIREBASE START
================================ */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let currentUser = null;


/* ===============================
🔐 GOOGLE LOGIN
================================ */

window.googleLogin = function(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then(async(result)=>{

const user = result.user;

currentUser = user;

document.getElementById("username").innerText =
"Welcome " + user.displayName;

const userRef = ref(db,"users/"+user.uid);

const snap = await get(userRef);

if(!snap.exists()){

set(userRef,{
name:user.displayName,
email:user.email,
coins:0,
lastReward:0
});

document.getElementById("coins").innerText = 0;

}

else{

document.getElementById("coins").innerText =
snap.val().coins;

}

})

.catch((error)=>{

alert(error.message);

});

}


/* ===============================
📺 WATCH AD + MONETAG
================================ */

window.watchAd = async function(){

if(!currentUser){

alert("Login First");

return;

}

/* Monetag Ad Open */

window.open("https://omg10.com/4/10701853","_blank");


let coins =
parseInt(document.getElementById("coins").innerText);

coins += 100;

document.getElementById("coins").innerText = coins;

const userRef = ref(db,"users/"+currentUser.uid);

update(userRef,{
coins:coins
});

alert("Ad Watched +100 Coins Added");

}


/* ===============================
🎁 DAILY REWARD
================================ */

window.dailyReward = async function(){

if(!currentUser){

alert("Login First");

return;

}

const userRef = ref(db,"users/"+currentUser.uid);

const snap = await get(userRef);

let data = snap.val();

let lastReward = data.lastReward || 0;

let now = Date.now();

let hours = (now - lastReward) / 1000 / 60 / 60;

if(hours < 24){

alert("Daily reward already claimed");

return;

}

let coins = data.coins + 500;

document.getElementById("coins").innerText = coins;

update(userRef,{
coins:coins,
lastReward:now
});

alert("500 Daily Reward Added");

}

</script>

</body>
</html>
