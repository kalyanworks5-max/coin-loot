<!DOCTYPE html>
<html>
<head>
<title>Coin Loot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* PAGE STYLE */
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

/* LOGIN BUTTON */
button{
background:#ff9800;
border:none;
padding:15px;
font-size:18px;
border-radius:8px;
color:white;
cursor:pointer;
margin:10px;
}

/* COINS BOX */
#coinsBox{
font-size:25px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Coin Loot</h1>

<!-- LOGIN BUTTON -->
<button onclick="googleLogin()">Login With Google</button>

<!-- USER INFO -->
<h3 id="username"></h3>

<!-- COINS -->
<div id="coinsBox">
Coins: <span id="coins">0</span>
</div>

<!-- WATCH AD -->
<button onclick="watchAd()">Watch Ad +100 Coins</button>

<script type="module">

/* FIREBASE IMPORT */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyBhMUIld4qnt42X0BWF_kYZr2R2olDghts",
authDomain: "coinloot-f15f3.firebaseapp.com",
databaseURL: "https://coinloot-f15f3-default-rtdb.firebaseio.com",
projectId: "coinloot-f15f3",
storageBucket: "coinloot-f15f3.firebasestorage.app",
messagingSenderId: "939943880173",
appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4",
measurementId: "G-XMZG9Q2128"
};


/* INITIALIZE FIREBASE */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);


/* GOOGLE LOGIN */

window.googleLogin = function(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then(async(result)=>{

const user = result.user;

document.getElementById("username").innerText = user.displayName;

const userRef = ref(db,"users/"+user.uid);

const snap = await get(userRef);

if(!snap.exists()){

set(userRef,{
name:user.displayName,
email:user.email,
coins:0
});

document.getElementById("coins").innerText = 0;

}else{

document.getElementById("coins").innerText = snap.val().coins;

}

window.currentUser = user;

})

.catch((error)=>{

alert(error.message);

});

}


/* WATCH AD FUNCTION */

window.watchAd = async function(){

if(!window.currentUser){

alert("Login First");

return;

}

let coins = parseInt(document.getElementById("coins").innerText);

coins += 100;

document.getElementById("coins").innerText = coins;

const userRef = ref(db,"users/"+window.currentUser.uid);

set(userRef,{
name:window.currentUser.displayName,
email:window.currentUser.email,
coins:coins
});

alert("100 Coins Added");

}

</script>

</body>
</html>
