<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Loot Login</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1f1f1f,#2e2e2e);
}

/* silver coins */

.coin{
position:absolute;
width:130px;
height:130px;
border-radius:50%;

background:radial-gradient(circle at 30% 30%, #ffffff 0%, #dcdcdc 30%, #bfbfbf 55%, #9a9a9a 75%, #6e6e6e 100%);

border:4px solid #cfcfcf;

display:flex;
align-items:center;
justify-content:center;

font-size:50px;
font-weight:bold;
color:#333;

animation:coinFloat 6s ease-in-out infinite;
}

.coin1{top:10%;left:12%;}
.coin2{top:18%;right:14%;}
.coin3{bottom:18%;left:18%;}
.coin4{bottom:12%;right:18%;}

@keyframes coinFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* login button */

.login-btn{

position:relative;

padding:16px 35px;

border:none;

border-radius:40px;

font-size:18px;

cursor:pointer;

display:flex;

align-items:center;

gap:10px;

background:white;

box-shadow:0 8px 20px rgba(0,0,0,0.6);

}

.login-btn img{
width:20px;
}

</style>
</head>

<body>

<div class="coin coin1">₡</div>
<div class="coin coin2">₡</div>
<div class="coin coin3">₡</div>
<div class="coin coin4">₡</div>

<button class="login-btn" onclick="googleLogin()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Login With Google
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBhMUIld4qnt42X0BWF_kYZr2R2olDghts",
authDomain: "coinloot-f15f3.firebaseapp.com",
projectId: "coinloot-f15f3",
storageBucket: "coinloot-f15f3.appspot.com",
messagingSenderId: "939943880173",
appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.googleLogin = function(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth, provider)

.then(()=>{
window.location="home.html";
})

.catch((error)=>{
alert(error.message);
});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Loot Home</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1f1f1f,#2e2e2e);
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.menu{
font-size:28px;
cursor:pointer;
}

.wallet{
background:linear-gradient(135deg,#cfcfcf,#8f8f8f);
color:black;
padding:8px 16px;
border-radius:25px;
font-weight:bold;
}

.dropdown{
position:absolute;
top:60px;
left:20px;
background:#1a1a1a;
border-radius:10px;
padding:10px;
display:none;
}

.dropdown div{
padding:8px 15px;
cursor:pointer;
}

.dropdown div:hover{
background:#333;
}

.centerBox{
height:80vh;
display:flex;
align-items:center;
justify-content:center;
}

.collectBtn{
background:linear-gradient(135deg,#dcdcdc,#8a8a8a);
color:black;
border:none;
padding:20px 40px;
font-size:20px;
border-radius:40px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="wallet">
🪙 <span id="coins">0</span>
</div>

</div>

<div class="dropdown" id="menuBox">
<div>Profile</div>
<div>Rewards</div>
<div>Logout</div>
</div>

<div class="centerBox">

<button class="collectBtn" onclick="collectCoins()">
Collect Your Coins (20)
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBhMUIld4qnt42X0BWF_kYZr2R2olDghts",
authDomain: "coinloot-f15f3.firebaseapp.com",
databaseURL: "https://coinloot-f15f3-default-rtdb.firebaseio.com",
projectId: "coinloot-f15f3",
storageBucket: "coinloot-f15f3.appspot.com",
messagingSenderId: "939943880173",
appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser;

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser=user;

const userRef=ref(db,"users/"+user.uid);

const snap=await get(userRef);

if(!snap.exists()){

set(userRef,{coins:0});

document.getElementById("coins").innerText=0;

}

else{

document.getElementById("coins").innerText=snap.val().coins;

}

}

});

window.collectCoins = async function(){

let coins=parseInt(document.getElementById("coins").innerText);

coins+=20;

document.getElementById("coins").innerText=coins;

const userRef=ref(db,"users/"+currentUser.uid);

update(userRef,{coins:coins});

}

window.toggleMenu=function(){

let menu=document.getElementById("menuBox");

menu.style.display = menu.style.display=="block" ? "none" : "block";

}

</script>

</body>
</html>
