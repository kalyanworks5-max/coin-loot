<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Loot</title>
<style>
/* =======================
    GLOBAL STYLES
======================= */
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#141e30,#243b55);color:white;overflow:hidden;}
.page{display:none;height:100vh;padding-top:80px;text-align:center;}
.active{display:block;}
input{width:90%;padding:10px;margin:10px;border-radius:10px;border:none;}
button{padding:10px 20px;border:none;border-radius:25px;background:gold;color:black;cursor:pointer;}
.card{background:rgba(255,255,255,0.1);padding:15px;margin:15px;border-radius:12px;}
.balance{font-size:40px;margin:20px;}
.nav{position:fixed;bottom:0;width:100%;height:65px;background:#111;display:flex;justify-content:space-around;align-items:center;}
.nav button{background:none;color:white;font-size:16px;}
.coin{position:absolute;color:gold;font-size:22px;animation:float 7s linear infinite;}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg)}100%{transform:translateY(-10vh) rotate(360deg)}}
</style>
</head>
<body>

<!-- =======================
    FLOATING COINS ANIMATION
======================= -->
<div class="coin" style="left:10%">🪙</div>
<div class="coin" style="left:30%;animation-delay:1s">🪙</div>
<div class="coin" style="left:50%;animation-delay:2s">🪙</div>
<div class="coin" style="left:70%;animation-delay:3s">🪙</div>
<div class="coin" style="left:90%;animation-delay:4s">🪙</div>

<!-- =======================
    LOGIN / SIGNUP PAGE
======================= -->
<div id="login" class="page active">
<div class="card">
<h2>Coin Loot</h2>
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone Number">
<input id="refInput" placeholder="Referral Code (Optional)">
<br>
<button onclick="signup()">Signup / Login</button>
</div>
</div>

<!-- =======================
    HOME PAGE
======================= -->
<div id="home" class="page">
<h2>Coin Loot</h2>
<div class="balance">Ʉ <span id="coins">0</span> (~₹<span id="coinsRs">0</span>)</div>
<button class="collect" onclick="collectCoins()">Collect Daily Coins</button>
</div>

<!-- =======================
    WALLET / BANK PAGE
======================= -->
<div id="wallet" class="page">
<h2>Wallet</h2>
<div class="card">Balance : Ʉ <span id="walletCoins">0</span> (~₹<span id="walletRs">0</span>)</div>
<div class="card">
<h3>Connect UPI / Bank</h3>
<input id="upi" placeholder="Enter UPI ID">
<button onclick="saveUPI()">Save UPI</button>
<p id="upiSaved"></p>
</div>
<div class="card">
<h3>Withdraw Coins</h3>
<input id="withdrawAmount" placeholder="Enter Coins">
<button onclick="withdraw()">Withdraw</button>
</div>
</div>

<!-- =======================
    PROFILE PAGE
======================= -->
<div id="profile" class="page">
<h2>Profile</h2>
<div class="card">Email : <span id="userEmail"></span></div>
<div class="card">
<h3>Referral Code</h3>
Your Code: <b id="refCode"></b>
</div>
<div class="card"><h3>Contact Support</h3>support@email.com</div>
<div class="card"><button onclick="logout()">Logout</button></div>
</div>

<!-- =======================
    NAVIGATION
======================= -->
<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('wallet')">Wallet</button>
<button onclick="showPage('profile')">Profile</button>
</div>

<script type="module">
// =======================
// FIREBASE SETUP
// =======================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-database.js";

// Firebase Config (replace with your own)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXX",
    appId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// =======================
// GLOBAL VARIABLES
// =======================
const AD_LINK = "https://YOUR_MONETAG_LINK";
const REF_BONUS = 200; // coins per referral
const MIN_WITHDRAW = 1000; // coins = 500 Rs
const COIN_TO_RS = 0.5; // 1 coin = 0.5 Rs

let currentUserData = null;

// =======================
// PAGE NAVIGATION FUNCTION
// =======================
function showPage(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

// =======================
// SIGNUP / LOGIN FUNCTION
// =======================
async function signup(){
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const refInput = document.getElementById("refInput").value.trim().toUpperCase();

    if(!email || !phone){ alert("Fill all fields"); return; }

    const userRef = ref(db, 'users/' + phone);
    const snapshot = await get(userRef);

    if(snapshot.exists()){
        alert("Account already exists");
        currentUserData = snapshot.val();
        updateDashboard();
        showPage("home");
        return;
    }

    // New user coins
    let coins = 20;
    const userCode = "REF"+Math.floor(Math.random()*100000);

    // Referral bonus
    if(refInput){
        const refUserRef = ref(db, 'users_by_code/' + refInput);
        const refSnap = await get(refUserRef);
        if(refSnap.exists()){
            update(refUserRef, { coins: refSnap.val().coins + REF_BONUS });
            alert("Referral accepted! 200 coins added to referrer");
        }
    }

    const newUser = {
        email,
        phone,
        coins,
        code: userCode,
        upi: "",
        lastCollectDate: ""
    };

    await set(userRef, newUser);
    await set(ref(db,'users_by_code/'+userCode), newUser);

    currentUserData = newUser;
    updateDashboard();
    showPage("home");
}

// =======================
// UPDATE DASHBOARD / BALANCE
// =======================
function updateDashboard(){
    if(!currentUserData) return;
    document.getElementById("userEmail").innerText = currentUserData.email;
    document.getElementById("refCode").innerText = currentUserData.code;
    document.getElementById("coins").innerText = currentUserData.coins;
    document.getElementById("coinsRs").innerText = (currentUserData.coins*COIN_TO_RS).toFixed(0);
    document.getElementById("walletCoins").innerText = currentUserData.coins;
    document.getElementById("walletRs").innerText = (currentUserData.coins*COIN_TO_RS).toFixed(0);
}

// =======================
// COLLECT DAILY COINS
// =======================
async function collectCoins(){
    if(!currentUserData) return;

    const today = new Date().toDateString();
    if(currentUserData.lastCollectDate === today){ alert("Already collected today!"); return; }

    window.open(AD_LINK,"_blank");

    currentUserData.coins += 20;
    currentUserData.lastCollectDate = today;
    await update(ref(db,'users/'+currentUserData.phone),{
        coins: currentUserData.coins,
        lastCollectDate: today
    });

    updateDashboard();
    alert("20 Coins added!");
}

// =======================
// SAVE UPI FUNCTION
// =======================
async function saveUPI(){
    if(!currentUserData) return;
    const upi = document.getElementById("upi").value.trim();
    if(!upi){ alert("Enter UPI"); return; }
    currentUserData.upi = upi;
    await update(ref(db,'users/'+currentUserData.phone),{upi});
    document.getElementById("upiSaved").innerText = "UPI Saved ✔";
}

// =======================
// WITHDRAW FUNCTION
// =======================
async function withdraw(){
    if(!currentUserData) return;
    const amt = parseInt(document.getElementById("withdrawAmount").value);
    if(isNaN(amt) || amt<MIN_WITHDRAW){ alert("Minimum withdraw is "+MIN_WITHDRAW+" coins (~₹"+(MIN_WITHDRAW*COIN_TO_RS)+")"); return; }
    if(amt > currentUserData.coins){ alert("Not enough coins"); return; }

    currentUserData.coins -= amt;
    await update(ref(db,'users/'+currentUserData.phone),{coins:currentUserData.coins});
    updateDashboard();
    alert("Withdraw request sent for "+amt+" coins (~₹"+(amt*COIN_TO_RS)+")");
}

// =======================
// LOGOUT FUNCTION
// =======================
function logout(){
    currentUserData = null;
    showPage("login");
}
</script>
</body>
</html>
