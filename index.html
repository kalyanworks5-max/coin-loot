<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Loot Login</title>

<style>

/* Light blue attractive background */

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#b9e6ff,#7fd3ff,#5ac8ff);
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
overflow:hidden;
}

/* Login button */

button{
padding:16px 32px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:#1a73e8;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
z-index:2;
}

/* Silver coin style */

.coin{
position:absolute;
width:50px;
height:50px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #ffffff, #cfcfcf, #9e9e9e);
box-shadow:inset 0 0 8px rgba(0,0,0,0.3),0 0 8px rgba(255,255,255,0.6);
animation:floatCoins linear infinite;
opacity:0.9;
}

/* coin floating animation */

@keyframes floatCoins{

0%{
transform:translateY(110vh) rotate(0deg);
}

100%{
transform:translateY(-20vh) rotate(360deg);
}

}

</style>
</head>

<body>

<!-- silver coins animation -->

<div class="coin" style="left:10%;animation-duration:9s;"></div>
<div class="coin" style="left:20%;animation-duration:7s;"></div>
<div class="coin" style="left:30%;animation-duration:10s;"></div>
<div class="coin" style="left:40%;animation-duration:8s;"></div>
<div class="coin" style="left:50%;animation-duration:11s;"></div>
<div class="coin" style="left:60%;animation-duration:6s;"></div>
<div class="coin" style="left:70%;animation-duration:9s;"></div>
<div class="coin" style="left:80%;animation-duration:7s;"></div>
<div class="coin" style="left:90%;animation-duration:10s;"></div>

<button onclick="googleLogin()">Login With Google</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"coinloot-f15f3.firebaseapp.com",
projectId:"coinloot-f15f3",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.googleLogin=function(){

const provider=new GoogleAuthProvider();

signInWithPopup(auth,provider)
.then(()=>{

window.location="home.html";

})
.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
