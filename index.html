<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Loot Login</title>

<style>

/* ===== Attractive Light Blue Background ===== */

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
background:linear-gradient(135deg,#b7e7ff,#79d1ff,#3ab5ff);
}

/* ===== Realistic Silver Coin ===== */

.coin{
position:absolute;
width:70px;
height:70px;
border-radius:50%;

background:
radial-gradient(circle at 30% 30%, #ffffff 0%, #dcdcdc 30%, #bfbfbf 55%, #9a9a9a 75%, #6e6e6e 100%);

border:3px solid #cfcfcf;

box-shadow:
inset 0 0 10px rgba(255,255,255,0.9),
inset 0 0 20px rgba(0,0,0,0.4),
0 6px 18px rgba(0,0,0,0.35);

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
font-weight:bold;
color:#555;

animation:coinMove linear infinite;
}

/* coin movement */

@keyframes coinMove{

0%{
transform:translateY(110vh) rotate(0deg);
}

100%{
transform:translateY(-15vh) rotate(360deg);
}

}

/* ===== Google Login Button ===== */

.login-btn{

display:flex;
align-items:center;
gap:10px;

padding:15px 30px;

border:none;

background:white;

color:#4285F4;

font-size:18px;

font-weight:bold;

border-radius:40px;

cursor:pointer;

box-shadow:0 8px 25px rgba(0,0,0,0.25);

transition:0.25s;

z-index:5;

}

.login-btn:hover{

transform:scale(1.08);

box-shadow:0 12px 35px rgba(0,0,0,0.35);

}

.login-btn img{
width:22px;
}

</style>
</head>

<body>

<!-- Silver Coins with Currency Symbol -->

<div class="coin" style="left:8%;animation-duration:11s;">₹</div>
<div class="coin" style="left:18%;animation-duration:9s;">₹</div>
<div class="coin" style="left:28%;animation-duration:13s;">₹</div>
<div class="coin" style="left:38%;animation-duration:10s;">₹</div>
<div class="coin" style="left:48%;animation-duration:14s;">₹</div>
<div class="coin" style="left:58%;animation-duration:8s;">₹</div>
<div class="coin" style="left:68%;animation-duration:12s;">₹</div>
<div class="coin" style="left:78%;animation-duration:10s;">₹</div>
<div class="coin" style="left:88%;animation-duration:13s;">₹</div>

<!-- Login With Google Button -->

<button class="login-btn" onclick="googleLogin()">
<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
Login With Google
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"coinloot-f15f3.firebaseapp.com",
projectId:"coinloot-f15f3"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

window.googleLogin=function(){

const provider=new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then(()=>{

window.location="home.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
