//login page

<!DOCTYPE html>
<html>
<head>

<title>Coin Loot Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* =========================
PAGE BACKGROUND
========================= */

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:linear-gradient(135deg,#0a3dff,#00aaff);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}


/* =========================
LOGIN BOX
========================= */

.login-box{
text-align:center;
background:#00000055;
padding:40px;
border-radius:15px;
backdrop-filter:blur(10px);
z-index:2;
}


/* =========================
LOGIN BUTTON
========================= */

button{
background:white;
color:#0a3dff;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}


/* =========================
MOVING COINS
========================= */

.coin{
position:absolute;
font-size:40px;
animation:moveCoins 10s linear infinite;
opacity:0.7;
}


/* coin animation */

@keyframes moveCoins{

0%{
transform:translateY(100vh) rotate(0deg);
}

100%{
transform:translateY(-100vh) rotate(360deg);
}

}

</style>

</head>

<body>


<!-- =========================
MOVING COINS BACKGROUND
========================= -->

<div class="coin" style="left:10%;animation-delay:0s;">🪙</div>
<div class="coin" style="left:25%;animation-delay:2s;">🪙</div>
<div class="coin" style="left:40%;animation-delay:4s;">🪙</div>
<div class="coin" style="left:60%;animation-delay:1s;">🪙</div>
<div class="coin" style="left:75%;animation-delay:3s;">🪙</div>
<div class="coin" style="left:90%;animation-delay:5s;">🪙</div>



<!-- =========================
LOGIN BOX
========================= -->

<div class="login-box">

<h1>Coin Loot</h1>

<p>Login To Start</p>

<!-- Google Login Button -->

<button onclick="googleLogin()">
Login With Google
</button>

</div>



<script type="module">

// =========================
// FIREBASE IMPORT
// =========================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// =========================
// FIREBASE CONFIG
// =========================

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "coinloot-f15f3.firebaseapp.com",
databaseURL: "https://coinloot-f15f3-default-rtdb.firebaseio.com",
projectId: "coinloot-f15f3",
storageBucket: "coinloot-f15f3.firebasestorage.app",
messagingSenderId: "939943880173",
appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4"

};


// =========================
// FIREBASE START
// =========================

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


// =========================
// GOOGLE LOGIN FUNCTION
// =========================

window.googleLogin = function(){

const provider = new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then((result)=>{

// login success అయితే home page open

window.location = "home.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>


</body>
</html>
