<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<style>

/* page background - light blue */

body{
margin:0;
height:100vh;
background:#a8dcff;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
overflow:hidden;
}

/* center button */

button{
padding:16px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:white;
color:#0b63ff;
font-weight:bold;
z-index:2;
}

/* silver coins */

.coin{
position:absolute;
font-size:38px;
color:silver;
animation:coins 8s linear infinite;
opacity:0.9;
}

@keyframes coins{

0%{
transform:translateY(110vh) rotate(0deg);
}

100%{
transform:translateY(-10vh) rotate(360deg);
}

}

</style>
</head>

<body>

<!-- silver coin animation -->

<div class="coin" style="left:10%;animation-delay:0s;">🪙</div>
<div class="coin" style="left:20%;animation-delay:1s;">🪙</div>
<div class="coin" style="left:30%;animation-delay:2s;">🪙</div>
<div class="coin" style="left:40%;animation-delay:3s;">🪙</div>
<div class="coin" style="left:50%;animation-delay:4s;">🪙</div>
<div class="coin" style="left:60%;animation-delay:2s;">🪙</div>
<div class="coin" style="left:70%;animation-delay:5s;">🪙</div>
<div class="coin" style="left:80%;animation-delay:1s;">🪙</div>
<div class="coin" style="left:90%;animation-delay:3s;">🪙</div>

<!-- login button -->

<button onclick="googleLogin()">Login With Google</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"coinloot-f15f3.firebaseapp.com",
projectId:"coinloot-f15f3",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.googleLogin=function(){

const provider=new GoogleAuthProvider();

signInWithPopup(auth,provider)

.then(()=>{

window.location="home.html";

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
