<!DOCTYPE html>
<html>
<head>
<title>Coin Loot Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

button{
background:#ff9800;
border:none;
padding:15px;
font-size:18px;
border-radius:10px;
color:white;
cursor:pointer;
margin:10px;
}

#coins{
font-size:30px;
}

</style>
</head>

<body>

<h1>Coin Loot Dashboard</h1>

<h2>Coins: <span id="coins">0</span></h2>

<button onclick="watchAd()">Watch Ad +100 Coins</button>

<button onclick="dailyReward()">Daily Reward +500</button>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
getDatabase,
ref,
get,
update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBhMUIld4qnt42X0BWF_kYZr2R2olDghts",
authDomain: "coinloot-f15f3.firebaseapp.com",
databaseURL: "https://coinloot-f15f3-default-rtdb.firebaseio.com",
projectId: "coinloot-f15f3",
storageBucket: "coinloot-f15f3.firebasestorage.app",
messagingSenderId: "939943880173",
appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let currentUser;

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser = user;

const userRef = ref(db,"users/"+user.uid);

const snap = await get(userRef);

if(snap.exists()){

document.getElementById("coins").innerText =
snap.val().coins;

}

}

});


window.watchAd = async function(){

window.open("https://omg10.com/4/10701853","_blank");

let coins = parseInt(document.getElementById("coins").innerText);

coins += 100;

document.getElementById("coins").innerText = coins;

const userRef = ref(db,"users/"+currentUser.uid);

update(userRef,{coins:coins});

}


window.dailyReward = async function(){

let coins = parseInt(document.getElementById("coins").innerText);

coins += 500;

document.getElementById("coins").innerText = coins;

const userRef = ref(db,"users/"+currentUser.uid);

update(userRef,{coins:coins});

}

</script>

</body>
</html>
