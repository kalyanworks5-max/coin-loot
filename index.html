<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinLoot - Earn & Track</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px; }
        .hidden { display: none; }
        #userCoins { font-size: 24px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>CoinLoot 💰</h1>
        
        <!-- Login Section -->
        <div id="loginSection">
            <p>వెల్కమ్! మీ పాయింట్స్ చూసుకోవడానికి లాగిన్ అవ్వండి.</p>
            <button id="loginBtn">Login with Google</button>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboardSection" class="hidden">
            <img id="userPhoto" src="" width="60" style="border-radius: 50%;">
            <h3 id="userName">Loading...</h3>
            <p>మీ ప్రస్తుత కాయిన్స్:</p>
            <div id="userCoins">0</div>
            <button id="collectBtn">Collect Daily Coins</button>
            <br>
            <button id="logoutBtn" style="background: #e74c3c;">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com";

        // మీ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBhMUIld4qnt42X0BWF_kYZr2R2olDghts",
            authDomain: "coinloot-f15f3.firebaseapp.com",
            databaseURL: "https://coinloot-f15f3-default-rtdb.firebaseio.com",
            projectId: "coinloot-f15f3",
            storageBucket: "coinloot-f15f3.firebasestorage.app",
            messagingSenderId: "939943880173",
            appId: "1:939943880173:web:0f1d9cf71c7dfb17deb3e4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const loginSection = document.getElementById('loginSection');
        const dashboardSection = document.getElementById('dashboardSection');

        // Google Login
        document.getElementById('loginBtn').onclick = () => {
            signInWithPopup(auth, provider).catch(error => alert(error.message));
        };

        // Logout
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Auth State Change (User లాగిన్ అయ్యాడా లేదా అని చెక్ చేస్తుంది)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;

                // యూజర్ డేటాని రీడ్ చేయడం
                const userRef = ref(db, 'users/' + user.uid);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.getElementById('userCoins').innerText = data.coins || 0;
                    } else {
                        // కొత్త యూజర్ అయితే 0 కాయిన్స్ తో సెట్ చేయడం
                        set(userRef, { name: user.displayName, email: user.email, coins: 0 });
                    }
                });
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // కాయిన్స్ కలెక్ట్ చేసే బటన్ (టెస్టింగ్ కోసం)
        document.getElementById('collectBtn').onclick = () => {
            const user = auth.currentUser;
            if (user) {
                const currentCoins = parseInt(document.getElementById('userCoins').innerText);
                update(ref(db, 'users/' + user.uid), {
                    coins: currentCoins + 10
                });
                alert("10 Coins added!");
            }
        };
    </script>
</body>
</html>
